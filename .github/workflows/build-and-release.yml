name: Build and Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-check.outputs.version }}
      notes: ${{ steps.changelog.outputs.notes }}
      notes_bbcode: ${{ steps.changelog.outputs.notes_bbcode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Workspace repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Mimesis-Workspace
          path: Workspace
          ssh-key: ${{ secrets.WORKSPACE_TOKEN }}

      - name: Checkout MimicAPI repository
        uses: actions/checkout@v4
        with:
          # MimicAPI is a public fork that lives on the personal DooDesch account, not the
          # DooDesch-Mods org the mod repos moved to - so it is hardcoded rather than derived
          # from github.repository_owner (which would resolve to the non-existent DooDesch-Mods/MimicAPI).
          repository: DooDesch/MimicAPI
          path: Workspace/MimicAPI

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify version in csproj matches the tag
        id: version-check
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CS_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" MarkerMod.csproj)
          if [ "$TAG_VERSION" != "$CS_VERSION" ]; then
            echo "Version mismatch: Tag version is $TAG_VERSION, but csproj version is $CS_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Single source of truth is the hand-maintained CHANGELOG.md. Pull out the section for
          # this version; it is reused for the GitHub release body and the Nexus file description.
          VERSION="${{ steps.version-check.outputs.version }}"
          SECTION=$(awk -v v="$VERSION" 'index($0,"## ["v"]")==1{grab=1;next} index($0,"## [")==1{if(grab)exit} grab{print}' CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "::warning::No CHANGELOG.md section found for $VERSION"
            SECTION="See CHANGELOG.md for details."
          fi
          # Markdown notes - GitHub renders Markdown in release bodies.
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$SECTION"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
          # Nexus file descriptions use BBCode, not Markdown. Convert "### Heading" to [b]Heading[/b],
          # "- item" bullets to [list]/[*], drop inline-code backticks, and join wrapped bullet lines.
          BBCODE=$(printf '%s\n' "$SECTION" | awk '
            function flush(){ if(buf!=""){ printf "[*]%s\n", buf; buf="" } }
            BEGIN{ inlist=0; buf="" }
            {
              line=$0; gsub(/`/,"",line); sub(/[ \t]+$/,"",line)
              if (line ~ /^### /){ flush(); if(inlist){print "[/list]"; inlist=0} h=line; sub(/^### /,"",h); printf "[b]%s[/b]\n", h; next }
              if (line ~ /^- /){ flush(); if(!inlist){print "[list]"; inlist=1} buf=line; sub(/^- /,"",buf); next }
              if (line ~ /^[ \t]*$/){ next }
              sub(/^[ \t]+/,"",line); if(buf!="") buf=buf " " line; else printf "%s\n", line
            }
            END{ flush(); if(inlist) print "[/list]" }')
          {
            echo "notes_bbcode<<CHANGELOG_EOF"
            echo "$BBCODE"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build the project
        run: dotnet build --configuration Release /p:WorkspaceLibPath="${{ github.workspace }}/Workspace/lib" /p:GameManagedPath="${{ github.workspace }}/Workspace/lib/game" /p:GameAssemblyPath="${{ github.workspace }}/Workspace/lib/game" /p:MelonLoaderPath="${{ github.workspace }}/Workspace/lib/melonloader" /p:MimicAPIPath="${{ github.workspace }}/Workspace/MimicAPI"

      - name: Prepare release directory
        run: |
          mkdir -p release
          cp bin/Release/netstandard2.1/MarkerMod.dll release/
          if [ -d "thunderstore" ]; then
            cp -r thunderstore/* release/ 2>/dev/null || true
            # Update version in manifest.json if it exists
            if [ -f "release/manifest.json" ]; then
              sed -i "s/\"version_number\": \".*\"/\"version_number\": \"${{ steps.version-check.outputs.version }}\"/" release/manifest.json
            fi
          fi
          # Ship the maintained CHANGELOG.md in the package (Thunderstore renders it on the
          # Changelog tab, so the full version history stays visible).
          if [ -f "CHANGELOG.md" ]; then
            cp CHANGELOG.md release/
          fi
          if [ -d "thunderstore" ]; then
            # Recreate README.md as UTF-8 without BOM
            if [ -f "thunderstore/README.md" ]; then
              cat thunderstore/README.md | iconv -f UTF-8 -t UTF-8//IGNORE > release/README.md 2>/dev/null || \
              sed '1s/^\xEF\xBB\xBF//' thunderstore/README.md > release/README.md || \
              cp thunderstore/README.md release/README.md
            fi
          fi

      - name: Create release ZIP
        run: zip -j "MarkerMod_${{ steps.version-check.outputs.version }}.zip" release/*

      - name: Upload Release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: MarkerMod
          path: "MarkerMod_${{ steps.version-check.outputs.version }}.zip"

      - name: Prepare Nexus bundle (includes MimicAPI.dll)
        run: |
          # Nexus has no dependency resolution like Thunderstore, so the runtime dependency
          # MimicAPI.dll must ship inside the Nexus archive. (Thunderstore keeps using the
          # NeoMimicry-MimicAPI dependency instead, to avoid loading two copies of MimicAPI.)
          mkdir -p nexus
          cp bin/Release/netstandard2.1/MarkerMod.dll nexus/
          MIMIC_DLL=$(find "${{ github.workspace }}/Workspace/MimicAPI" -path '*/bin/Release/*/MimicAPI.dll' | head -n1)
          if [ -z "$MIMIC_DLL" ]; then
            # Some MimicAPI csproj revisions emit to bin/<tfm> without a Release subfolder.
            MIMIC_DLL=$(find "${{ github.workspace }}/Workspace/MimicAPI" -path '*/bin/*/MimicAPI.dll' | head -n1)
          fi
          if [ -z "$MIMIC_DLL" ]; then
            echo "::error::MimicAPI.dll not found - refusing to ship an incomplete Nexus bundle" >&2
            exit 1
          fi
          cp "$MIMIC_DLL" nexus/
          if [ -f "thunderstore/README.md" ]; then
            cp thunderstore/README.md nexus/ || true
          fi
          zip -j "MarkerMod_${{ steps.version-check.outputs.version }}_nexus.zip" nexus/*
          echo "Nexus bundle contents:"
          unzip -l "MarkerMod_${{ steps.version-check.outputs.version }}_nexus.zip"

      - name: Upload Nexus ZIP
        uses: actions/upload-artifact@v4
        with:
          name: MarkerMod-nexus
          path: "MarkerMod_${{ steps.version-check.outputs.version }}_nexus.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built ZIP
        uses: actions/download-artifact@v4
        with:
          name: MarkerMod

      - name: Extract DLL from ZIP
        run: |
          unzip -q "MarkerMod_${{ needs.build.outputs.version }}.zip" -d release/
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/MarkerMod.dll
          body: |
            ## Changes in ${{ needs.build.outputs.version }}

            ${{ needs.build.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  thunderstore:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download built ZIP
        uses: actions/download-artifact@v4
        with:
          name: MarkerMod

      - name: Extract ZIP for Thunderstore
        run: |
          mkdir -p thunderstore-package
          unzip -q "MarkerMod_${{ needs.build.outputs.version }}.zip" -d thunderstore-package/


      - name: Upload to Thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: mimesis
          namespace: DooDesch
          name: MarkerMod
          description: Use paintballs as markers in dungeons. Paintballs create puddles and leave footprints when you walk through them. Without this mod, these effects are useless as they disappear too quickly. MarkerMod makes them into practical markers you can use in dungeons.
          version: ${{ needs.build.outputs.version }}
          repo: mimesis.thunderstore.io
          path: thunderstore-package
          categories: |
            Mods

  nexus:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Nexus bundle (MarkerMod.dll + MimicAPI.dll)
        uses: actions/download-artifact@v4
        with:
          name: MarkerMod-nexus

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: "7545473"
          filename: "MarkerMod_${{ needs.build.outputs.version }}_nexus.zip"
          version: ${{ needs.build.outputs.version }}
          display_name: "MarkerMod ${{ needs.build.outputs.version }}"
          description: ${{ needs.build.outputs.notes_bbcode }}
          file_category: main
          archive_existing_file: true
